# https://github.com/johnthagen/min-sized-rust
# https://corrode.dev/blog/tips-for-faster-rust-compile-times/
# https://davidlattimore.github.io/posts/2024/02/04/speeding-up-the-rust-edit-build-run-cycle.html
# https://eisel.me/lld

# [build]
# rustflags = ["--cfg", "tokio_unstable"]

[profile.dev]
split-debuginfo = "unpacked"
# Uncomment these 2 if using the debugger!
debug = 0
strip = "debuginfo"

[profile.release]
codegen-units = 1
lto = true
opt-level = "z"
panic = "abort"
strip = "debuginfo"

[profile.dist]
inherits = "release"

[profile.bench]
inherits = "release"
lto = false
codegen-units = 16

# [target.aarch64-apple-darwin]
# rustflags = ["-C", "link-arg=-fuse-ld=/opt/homebrew/opt/llvm/bin/ld64.lld"]

# [registries.crates-io]
# protocol = "sparse"

# Disable git's fsmonitor for all test/build subprocesses. When a dev has
# `core.fsmonitor = true` set globally, git commands run by test sandboxes
# (e.g. `Sandbox::enable_git` via `std::process::Command::output`) spawn a
# detached `fsmonitor--daemon` that inherits the stdout/stderr pipe. The pipe
# never reaches EOF while the daemon runs, so `output()` blocks forever and
# tests hang (intermittently, worse under high `-j`). Injecting the config via
# git's env vars overrides the global setting for every git subprocess.
[env]
GIT_CONFIG_COUNT = "1"
GIT_CONFIG_KEY_0 = "core.fsmonitor"
GIT_CONFIG_VALUE_0 = "false"
