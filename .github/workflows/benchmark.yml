name: Benchmark

on:
  push:
    branches:
      - master
      - develop-*
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  id-token: write

env:
  RUST_LOG: info
  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  # Limit parallel compilation jobs to reduce peak memory usage.
  # The bench profile inherits from release (LTO + codegen-units=1),
  # which is very memory-intensive.
  CARGO_BUILD_JOBS: 2

jobs:
  bench:
    name: Bench
    runs-on: depot-ubuntu-24.04-8
    strategy:
      fail-fast: false
      matrix:
        package:
          - moon_affected
          - moon_toolchain_plugin
          - moon_workspace
    steps:
      - uses: actions/checkout@v6

      - uses: moonrepo/setup-rust@v1
        with:
          bins: cargo-codspeed
          cache-target: release

      - name: Build the benchmark targets
        run: cargo codspeed build -p ${{ matrix.package }} --features codspeed

      - name: Run the benchmarks
        uses: CodSpeedHQ/action@v4
        with:
          mode: simulation
          run: cargo codspeed run -p ${{ matrix.package }}
