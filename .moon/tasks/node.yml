$schema: '../cache/schemas/tasks.json'

inheritedBy:
  toolchains: 'node'

implicitDeps:
  - '^:build'

fileGroups:
  configs:
    - '*.{js,json}'
  sources:
    - 'src/**/*'
    - 'types/**/*'
  tests:
    - 'tests/**/*'

tasks:
  build:
    command: 'packemon build --addFiles --addExports --declaration'
    env:
      NODE_ENV: 'production'
    inputs:
      - '@globs(sources)'
      - 'package.json'
      - 'tsconfig.json'
      - 'tsconfig.*.json'
      - '/tsconfig.options.json'
    outputs:
      - 'cjs'

  format:
    command: 'vp fmt --check .'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
      - '/vite.config.ts'

  format-write:
    extends: 'format'
    args: '--write'
    options:
      runInCI: false

  lint:
    command: 'eslint'
    args:
      - '--cache'
      - '--cache-location'
      - './.eslintcache'
      - '--color'
      - '--ext'
      - '.js,.ts,.tsx'
      - '--exit-on-fatal-error'
      - '--no-error-on-unmatched-pattern'
      # - '--report-unused-disable-directives'
      - '.'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
      - '*.{js,cjs,mjs,ts}'
      - 'tsconfig.json'
      - '/eslint.config.mjs'
      - '/tsconfig.eslint.json'
      - '/tsconfig.options.json'

  lint-fix:
    extends: 'lint'
    args: '--fix'
    options:
      runInCI: false

  test:
    command: 'vp test run --passWithNoTests'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
      - '/vite.config.ts'

  typecheck:
    command: 'tsc --build'
    inputs:
      - '@globs(sources)'
      - '@globs(tests)'
      - 'tsconfig.json'
      - '/tsconfig.options.json'
