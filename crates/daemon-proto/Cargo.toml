[package]
name = "moon_daemon_proto"
version = "0.0.1"
edition = "2024"
license = "MIT"
description = "Daemon protobufs."
homepage = "https://moonrepo.dev/moon"
repository = "https://github.com/moonrepo/moon"
publish = false

[dependencies]
md5 = { workspace = true }
prost = "0.14.3"
starbase_utils = { workspace = true, features = ["fs-lock"] }
tonic = { workspace = true, features = ["channel", "codegen", "transport"] }
tonic-prost = { workspace = true }
tracing = { workspace = true }

[build-dependencies]
tonic-prost-build = "0.14.5"

[lints]
workspace = true
