syntax = "proto3";

package moon.daemon.v1;

service MoonDaemon {
  rpc ArchiveTaskOutputs(ArchiveTaskOutputsRequest) returns (ArchiveTaskOutputsResponse);
  rpc CleanCache(CleanCacheRequest) returns (CleanCacheResponse);
  rpc HashFiles(HashFilesRequest) returns (HashFilesResponse);
  rpc Start(StartRequest) returns (StartResponse);
  rpc Status(StatusRequest) returns (StatusResponse);
  rpc Stop(StopRequest) returns (StopResponse);
}

message ArchiveTaskOutputsRequest {
  string task_target = 1;
  string hash = 2;
}

message ArchiveTaskOutputsResponse {
  bool archived = 1;
}

message CleanCacheRequest {
  bool all = 1;
  string lifetime = 2;
}

message CleanCacheResponse {
  uint32 files_deleted = 1;
  uint64 bytes_saved = 2;
}

message HashFilesRequest {
  repeated string files = 1;
}

message HashFilesResponse {
  map<string, string> files = 1;
}

message StartRequest {
  string workspace_root = 1;
}

message StartResponse {
  uint32 pid = 1;
  string endpoint = 2;
  bool already_running = 3;
}

message StatusRequest {}

message StatusResponse {
  bool running = 1;
  uint32 pid = 2;
  string endpoint = 3;
  uint64 uptime_secs = 4;
  string moon_version = 5;
  string workspace_root = 6;
}

message StopRequest {}

message StopResponse {
  bool stopped = 1;
}
