[package]
name = "moon_daemon"
version = "0.0.1"
edition = "2024"
publish = false

[dependencies]
moon_common = { path = "../common" }
moon_file_watcher = { path = "../file-watcher" }
moon_process = { path = "../process" }
async-stream = { workspace = true }
hyper-util = "0.1.20"
md5 = { workspace = true }
miette = { workspace = true }
notify-debouncer-full = { version = "0.7.0", features = ["flume"] }
prost = "0.14.3"
rustc-hash = { workspace = true }
starbase_utils = { workspace = true, features = ["fs-lock"] }
thiserror = { workspace = true }
tokio = { workspace = true, features = ["net"] }
tonic = { workspace = true, features = ["channel", "codegen", "transport"] }
tonic-prost = { workspace = true }
tower = { workspace = true }
tracing = { workspace = true }

[target.'cfg(unix)'.dependencies]
libc = "0.2.183"
tokio-stream = { version = "0.1.18", features = ["net"] }

[target.'cfg(windows)'.dependencies]
futures-core = "0.3.32"
windows-sys = { version = "0.61.2", default-features = false, features = [
    "Win32_Foundation",
    "Win32_System_Threading",
] }

[dev-dependencies]
async-trait = { workspace = true }
miette = { workspace = true }
moon_file_watcher = { path = "../file-watcher" }
starbase_sandbox = { workspace = true }
tokio = { workspace = true }

[build-dependencies]
tonic-prost-build = "0.14.5"

[lints]
workspace = true
