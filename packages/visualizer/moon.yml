language: typescript
layer: library

fileGroups:
  vite:
    - 'src/**/*'
    - 'index.html'
    - 'vite.config.*'

tasks:
  dev:
    command: 'vp dev'
    preset: 'server'

  build:
    command: 'vp build'
    inputs:
      - '@group(vite)'
    outputs:
      - 'dist'

  serve:
    command: 'vp preview --port 5000'
    deps:
      - '~:build'
    preset: 'server'

workspace:
  inheritedTasks:
    exclude:
      - build
